name: webshop

services:
  server:
    image: 'nginx:stable-alpine'
    ports:
      - '8000:80'
    volumes:
       - .:/var/www/html
       - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php
      - mysql
  php:
    build:
      context: .
      dockerfile: dockerfiles/php.dockerfile
    volumes:
      - .:/var/www/html:delegated
  mysql:
    image: mysql
    env_file:
      - ./Dockerfiles/mysql.env
    volumes:
      - data:/var/lib/mysql
    ports:
      - "3307:3306"
  node:
    image: node:20-alpine
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    ports:
      - "5173:5173"
    user: "1000:1000"
    command: sh -c "npm run dev || tail -f /dev/null"
  mailpit:
    image: axllent/mailpit
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  data:
